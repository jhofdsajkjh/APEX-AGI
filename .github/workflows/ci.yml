name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: omega-agi

      - name: Check formatting
        run: cargo fmt --check --manifest-path omega-agi/Cargo.toml
        if: matrix.toolchain == 'stable'

      - name: Clippy (lints)
        run: cargo clippy --manifest-path omega-agi/Cargo.toml --workspace -- -D warnings
        continue-on-error: true  # clippy is advisory until 100% clean

      - name: Build workspace
        run: cargo build --manifest-path omega-agi/Cargo.toml --workspace --release

      - name: Run tests
        run: cargo test --manifest-path omega-agi/Cargo.toml --workspace --release

      - name: Test auto_evolve module
        run: cargo test --manifest-path omega-agi/Cargo.toml -p omega-evolution -- auto_evolve --nocapture

  # ── Integration smoke test ──────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build release
        run: cargo build --manifest-path omega-agi/Cargo.toml -p omega-agi --release

      - name: Smoke test — version
        run: ./omega-agi/target/release/omega-agi version

      - name: Smoke test — check
        run: ./omega-agi/target/release/omega-agi check

      - name: Smoke test — agent with mock LLM
        run: |
          ./omega-agi/target/release/omega-agi run "请检查系统健康状态" \
            || echo "Agent run is advisory (needs OMEGA_API_KEY for real LLM)"
