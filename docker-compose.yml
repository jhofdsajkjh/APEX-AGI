services:
  omega-agi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omega-agi
    ports:
      - "8080:8080"
    environment:
      - OMEGA_API_KEY=${OMEGA_API_KEY:-}
      - OMEGA_API_URL=${OMEGA_API_URL:-https://api.openai.com/v1}
      - OMEGA_MODEL_NAME=${OMEGA_MODEL_NAME:-gpt-4o}
      - OMEGA_MAX_TOKENS=${OMEGA_MAX_TOKENS:-4096}
      - OMEGA_TEMPERATURE=${OMEGA_TEMPERATURE:-0.7}
      - OMEGA_LLM_PROVIDER=${OMEGA_LLM_PROVIDER:-openai}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OMEGA_DATA_DIR=/workspace/data
    volumes:
      - omega_data:/workspace/data
      - .:/workspace:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "omega-agi", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  omega_data:
